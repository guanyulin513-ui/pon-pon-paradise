<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>崩崩樂園 - Boom Boom Park</title>
    <!-- 引入 Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #F8F9FA;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --accent: #FFB7B2;
            --font: system-ui, -apple-system, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: var(--font);
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E9F5F8 100%);
            display: flex; flex-direction: column;
        }

        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        /* 玻璃擬態 UI */
        .ui-panel {
            position: absolute; background: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10;
        }

        #top-info {
            top: 15px; left: 10px; right: 10px; height: 70px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 10px;
        }

        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: #555; }
        .stat-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; }

        #bottom-ctrl {
            bottom: 20px; left: 10px; right: 10px; height: 80px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .weapon-btn {
            width: 60px; height: 60px; border-radius: 12px; border: 2px solid transparent;
            background: white; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .weapon-btn.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 15px rgba(255,183,178,0.5); }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 4px; }

        /* 過關遮罩 */
        #overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal { padding: 30px; text-align: center; max-width: 80%; }
        .btn-main {
            background: linear-gradient(135deg, #FFB7B2, #FFDAC1);
            color: white; border: none; padding: 12px 30px; border-radius: 25px;
            font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 上方資訊 -->
    <div id="top-info" class="ui-panel">
        <div class="stat"><span class="stat-label">Level</span><span id="ui-level">1</span></div>
        <div class="stat"><span class="stat-label">Ammo</span><span id="ui-ammo">5</span></div>
        <div class="stat" style="width: 40%;">
            <span class="stat-label">Destroyed</span>
            <div style="width: 100%; height: 8px; background: #EEE; border-radius: 4px; overflow: hidden; margin-top: 5px;">
                <div id="ui-progress" style="width: 0%; height: 100%; background: #B5EAD7; transition: 0.3s;"></div>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- 下方按鈕 -->
    <div id="bottom-ctrl" class="ui-panel">
        <button class="weapon-btn active" onclick="setWeapon('normal', this)">
            <div class="dot" style="background:#FFB7B2"></div><span style="font-size:10px">普通</span>
        </button>
        <button class="weapon-btn" onclick="setWeapon('heavy', this)">
            <div class="dot" style="background:#A2CFFE; width:18px; height:18px;"></div><span style="font-size:10px">重擊</span>
        </button>
        <button class="weapon-btn" onclick="setWeapon('blast', this)">
            <div class="dot" style="background:#FFDAC1; border: 1px dashed #E5A186;"></div><span style="font-size:10px">爆裂</span>
        </button>
    </div>

    <!-- 遮罩 -->
    <div id="overlay">
        <div class="ui-panel modal">
            <h2 id="m-title">崩崩樂園</h2>
            <p id="m-desc">柔和色系的物理摧毀實驗室<br>拖拽虛線，瞄準發射！</p>
            <button class="btn-main" onclick="startGame()">開始拆除</button>
        </div>
    </div>
</div>

<script>
/** 遊戲引擎與參數 **/
const { Engine, World, Bodies, Composite, Vector, Body, Events } = Matter;

let engine, canvas, ctx;
let W, H;
let ammo = 5, level = 1, currentWeapon = 'normal';
let blocks = [], particles = [], dyingBodies = [];
let isDragging = false, dragStart = {x:0, y:0}, dragEnd = {x:0, y:0};
let destroyedCount = 0, totalBlocks = 0;

function init() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);

    engine = Engine.create();
    engine.world.gravity.y = 1.0;

    // 開始渲染循環
    update();
    
    // 綁定輸入
    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', (e) => onStart(e.touches[0]));
    canvas.addEventListener('touchmove', (e) => onMove(e.touches[0]));
    window.addEventListener('touchend', onEnd);
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

function loadLevel(lv) {
    World.clear(engine.world);
    blocks = []; dyingBodies = []; particles = [];
    level = lv;
    destroyedCount = 0;
    ammo = lv <= 3 ? 6 : 5;

    // 地面
    const ground = Bodies.rectangle(W/2, H + 20, W * 2, 60, { isStatic: true });
    World.add(engine.world, ground);

    // 建立建築物 (莫蘭迪色系)
    const colors = ['#B5EAD7', '#FFDAC1', '#E2F0CB', '#C7CEEA', '#FFB7B2'];
    const centerX = W / 2;
    const bW = 35, bH = 35;
    
    let rows = 4 + Math.min(lv, 6);
    let cols = lv === 1 ? 1 : 2;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let x = centerX - ((cols-1) * bW / 2) + (c * (bW + 2));
            let y = (H - 50) - (r * (bH + 2));
            let box = Bodies.rectangle(x, y, bW, bH, {
                restitution: 0.1, friction: 0.5,
                render: { fill: colors[Math.floor(Math.random() * colors.length)] }
            });
            box.isBlock = true;
            blocks.push(box);
            World.add(engine.world, box);
        }
    }
    totalBlocks = blocks.length;
    updateUI();
}

/** 渲染與物理迴圈 **/
function update() {
    Engine.update(engine, 1000 / 60);
    
    // 清除
    ctx.clearRect(0, 0, W, H);

    // 繪製瞄準線
    if (isDragging) {
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(dragStart.x, dragStart.y);
        ctx.lineTo(dragEnd.x, dragEnd.y);
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // 繪製物體
    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(b => {
        if (b.isStatic && b.position.y > H) return; // 不畫隱形地面

        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        
        // 視覺特效：圓角與陰影
        ctx.fillStyle = b.render.fill || '#CCC';
        ctx.globalAlpha = b.opacity || 1;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.05)";
        ctx.shadowOffsetY = 3;

        if (b.circleRadius) {
            ctx.beginPath();
            ctx.arc(0, 0, b.circleRadius, 0, Math.PI*2);
            ctx.fill();
        } else {
            // 方塊
            const w = b.bounds.max.x - b.bounds.min.x;
            const h = b.bounds.max.y - b.bounds.min.y;
            // 簡化版圓角
            ctx.beginPath();
            const r = 5;
            ctx.moveTo(-w/2+r, -h/2);
            ctx.lineTo(w/2-r, -h/2); ctx.quadraticCurveTo(w/2, -h/2, w/2, -h/2+r);
            ctx.lineTo(w/2, h/2-r); ctx.quadraticCurveTo(w/2, h/2, w/2-r, h/2);
            ctx.lineTo(-w/2+r, h/2); ctx.quadraticCurveTo(-w/2, h/2, -w/2, h/2-r);
            ctx.lineTo(-w/2, -h/2+r); ctx.quadraticCurveTo(-w/2, -h/2, -w/2+r, -h/2);
            ctx.fill();
        }
        ctx.restore();

        // 判定掉落消失
        if (!b.isStatic && b.position.y > H - 30 && b.isBlock && !b.isDying) {
            b.isDying = true;
            destroyedCount++;
            dyingBodies.push(b);
            updateUI();
            if (destroyedCount / totalBlocks >= 0.8) setTimeout(() => checkEnd(true), 500);
        }
    });

    // 處理淡出
    for(let i = dyingBodies.length-1; i>=0; i--) {
        let b = dyingBodies[i];
        b.opacity = (b.opacity || 1) - 0.03;
        if (b.opacity <= 0) {
            World.remove(engine.world, b);
            dyingBodies.splice(i, 1);
        }
    }

    // 粒子
    updateParticles();

    requestAnimationFrame(update);
}

/** 互動與功能 **/
function onStart(e) {
    const rect = canvas.getBoundingClientRect();
    isDragging = true;
    dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    dragEnd = { ...dragStart };
}
function onMove(e) {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    dragEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    if (ammo <= 0) return;

    const dx = dragStart.x - dragEnd.x;
    const dy = dragStart.y - dragEnd.y;
    const force = Math.min(Vector.magnitude({x:dx, y:dy}) * 0.005, 0.2);
    const angle = Math.atan2(dy, dx);
    
    fire(angle, force);
}

function fire(angle, force) {
    let r = 12, f = '#FFB7B2', m = 1;
    if (currentWeapon === 'heavy') { r = 22; f = '#A2CFFE'; m = 5; }
    if (currentWeapon === 'blast') { f = '#FFDAC1'; }

    const bullet = Bodies.circle(dragStart.x, dragStart.y, r, {
        restitution: 0.5, mass: m,
        render: { fill: f }
    });
    World.add(engine.world, bullet);
    Body.applyForce(bullet, bullet.position, { x: Math.cos(angle)*force*m, y: Math.sin(angle)*force*m });
    
    ammo--;
    updateUI();

    if (currentWeapon === 'blast') {
        setTimeout(() => {
            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(b => {
                if(!b.isStatic) {
                    const dist = Vector.magnitude(Vector.sub(b.position, bullet.position));
                    if(dist < 150) {
                        const forceVec = Vector.mult(Vector.normalise(Vector.sub(b.position, bullet.position)), 0.05);
                        Body.applyForce(b, b.position, forceVec);
                    }
                }
            });
            spawnParticles(bullet.position.x, bullet.position.y, f);
            World.remove(engine.world, bullet);
        }, 800);
    }

    if (ammo === 0) setTimeout(() => checkEnd(false), 3000);
}

function updateUI() {
    document.getElementById('ui-level').innerText = level;
    document.getElementById('ui-ammo').innerText = ammo;
    document.getElementById('ui-progress').style.width = (destroyedCount / totalBlocks * 100) + '%';
}

function setWeapon(type, btn) {
    currentWeapon = type;
    document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function checkEnd(isWin) {
    if (isWin) {
        showModal("拆除完成！", "這個樂園被你優雅地摧毀了。", level < 10 ? "下一關" : "重頭開始");
        level = level < 10 ? level + 1 : 1;
    } else if (destroyedCount / totalBlocks < 0.8 && ammo === 0) {
        showModal("拆除失敗", "結構依然頑固，再試一次？", "重試本關");
    }
}

function showModal(t, d, b) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-desc').innerText = d;
    document.querySelector('.btn-main').innerText = b;
    document.getElementById('overlay').classList.remove('hidden');
}

function startGame() {
    document.getElementById('overlay').classList.add('hidden');
    loadLevel(level);
}

function spawnParticles(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color});
    }
}

function updateParticles() {
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
        else {
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

// 啟動
window.onload = init;
</script>

</body>
</html>
