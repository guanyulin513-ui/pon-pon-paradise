<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>崩崩樂園 - 建築拆除大師</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --sky: linear-gradient(to bottom, #A2D2FF 0%, #D0EBFF 100%);
            --accent: #FFB7B2;
            --ui-glass: rgba(255, 255, 255, 0.8);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 強制橫向邏輯 */
        #orientation-wrapper {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        @media screen and (orientation: portrait) {
            #game-container {
                width: 100vh; height: 100vw;
                transform: rotate(90deg);
                transform-origin: center;
            }
        }
        @media screen and (orientation: landscape) {
            #game-container {
                width: 100vw; height: 100vh;
            }
        }

        #game-container {
            position: relative;
            background: var(--sky);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas { display: block; touch-action: none; }

        /* UI Styling */
        .ui { position: absolute; background: var(--ui-glass); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); z-index: 100; pointer-events: auto; }
        #top-info { top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 40px; display: flex; gap: 30px; align-items: center; }
        #sidebar { left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 800; color: #444; }

        .wp-btn { 
            width: 65px; height: 65px; border-radius: 15px; border: 3px solid transparent; 
            background: white; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .wp-btn.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 10px 20px rgba(255,183,178,0.4); }
        .wp-btn span { font-size: 10px; font-weight: bold; margin-top: 5px; color: #666; }

        /* Progress Bar */
        .prog-bg { width: 120px; height: 12px; background: rgba(0,0,0,0.1); border-radius: 6px; overflow: hidden; margin-top: 5px; border: 1px solid rgba(255,255,255,0.5); }
        .prog-fill { height: 100%; background: linear-gradient(90deg, #95D5B2, #2D6A4F); width: 0%; transition: width 0.5s ease-out; }

        /* Overlays */
        #msg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .btn-start { background: var(--accent); color: white; border: none; padding: 15px 50px; border-radius: 40px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.2s; }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,183,178,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="orientation-wrapper">
    <div id="game-container">
        <!-- HUD -->
        <div id="top-info" class="ui">
            <div class="stat-box"><div class="stat-label">關卡</div><div id="ui-lv" class="stat-value">1</div></div>
            <div class="stat-box"><div class="stat-label">彈藥</div><div id="ui-am" class="stat-value">8</div></div>
            <div class="stat-box">
                <div class="stat-label">建築摧毀率 (目標 90%)</div>
                <div class="prog-bg"><div id="ui-prog" class="prog-fill"></div></div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <!-- 側邊欄 -->
        <div id="sidebar" class="ui">
            <button class="wp-btn active" onclick="setWp('normal', this)">
                <div style="width:16px; height:16px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #FFB7B2, #E58E88);"></div>
                <span>標準彈</span>
            </button>
            <button class="wp-btn" onclick="setWp('heavy', this)">
                <div style="width:24px; height:24px; border-radius:4px; background:#4A4E69; border: 2px solid #9A8C98;"></div>
                <span>重型彈</span>
            </button>
            <button class="wp-btn" onclick="setWp('blast', this)">
                <div style="width:18px; height:18px; border-radius:50%; background:#FEE440; box-shadow: 0 0 10px #FEE440;"></div>
                <span>能量爆裂</span>
            </button>
        </div>

        <!-- 訊息彈窗 -->
        <div id="msg-overlay">
            <div class="modal">
                <h1 style="margin:0; color:#444; font-size: 32px;">崩崩樂園</h1>
                <p id="m-desc" style="color:#777; margin: 20px 0; line-height:1.6;">精緻物理拆除模擬<br>向左拉動發射，觀察緩慢而震撼的倒塌過程</p>
                <button class="btn-start" onclick="startGame()">進入實驗室</button>
            </div>
        </div>
    </div>
</div>

<script>
const { Engine, Render, Runner, World, Bodies, Composite, Vector, Body, Events } = Matter;

let engine, runner, canvas, ctx, audioCtx;
let W, H, ammo = 8, level = 1, weapon = 'normal';
let isDragging = false, dragE = {x:0, y:0};
let totalBlocks = 0, destroyedCount = 0;
let dyingBodies = [], particles = [];

// 發射點定位 (左側 1/5)
let launcherPos = { x: 0, y: 0 };
const groundH = 80;

function init() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    
    engine = Engine.create({ enableSleeping: true });
    engine.world.gravity.y = 1.0;
    // 增加物理步進次數以防止穿透並提升倒塌質感
    engine.positionIterations = 15;
    engine.velocityIterations = 15;

    runner = Runner.create();
    Runner.run(runner, engine);

    resize();
    window.addEventListener('resize', resize);
    loop();
    setupControls();
}

function resize() {
    // 獲取容器尺寸 (考慮旋轉)
    const container = document.getElementById('game-container');
    W = canvas.width = container.clientWidth;
    H = canvas.height = container.clientHeight;
    
    launcherPos = { x: W * 0.15, y: H - groundH - 50 };
    resetGround();
}

function resetGround() {
    if(window.ground) World.remove(engine.world, window.ground);
    window.ground = Bodies.rectangle(W/2, H - groundH/2, W * 2, groundH, { isStatic: true, friction: 0.8 });
    World.add(engine.world, window.ground);
}

/** 建築物生成邏輯 **/
function createBuilding(level) {
    const startX = W * 0.7;
    const bW = 40, bH = 30;
    const colors = ['#E9C46A', '#F4A261', '#E76F51', '#A8DADC', '#457B9D'];
    
    // 隨關卡增加複雜度
    let stacks = 1 + Math.floor(level / 3);
    if (stacks > 3) stacks = 3;
    
    for(let s=0; s<stacks; s++) {
        let currentX = startX + (s * 100);
        let rows = 4 + level;
        if(rows > 15) rows = 15;
        let cols = (level % 2 === 0) ? 2 : 1;

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                let x = currentX - ((cols-1)*bW/2) + (c*(bW+5));
                let y = (H - groundH) - (bH/2) - (r*(bH+2));
                
                // 定義建築件類型：0=地基, 1=窗戶層, 2=屋頂
                let type = 1;
                if(r === 0) type = 0;
                else if(r === rows - 1) type = 2;

                let box = Bodies.rectangle(x, y, bW, bH, {
                    restitution: 0.05, friction: 0.6, frictionStatic: 1.0,
                    render: { fill: colors[Math.floor(Math.random()*colors.length)] }
                });
                box.isBlock = true;
                box.bType = type; // 記錄類型用於繪製
                World.add(engine.world, box);
            }
        }
    }
    totalBlocks = Composite.allBodies(engine.world).filter(b => b.isBlock).length;
}

/** 遊戲渲染主循環 **/
function loop() {
    // 物理平滑步進 (兩倍速運算以維持穩定，但物體速度慢)
    Engine.update(engine, 1000/60);

    ctx.clearRect(0, 0, W, H);
    drawBackground();

    // 瞄準與發射台
    drawLauncher();

    // 繪製建築組件
    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(b => {
        if(b.isStatic) return;
        
        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        ctx.globalAlpha = b.opacity || 1;

        if(b.isBlock) {
            drawDetailedBuilding(b);
        } else {
            drawDetailedBullet(b);
        }
        ctx.restore();

        // 判定摧毀邏輯 (90% 目標)
        if(b.isBlock && !b.isDying) {
            const distFromOrigin = Math.abs(b.position.y - (H - groundH));
            const isTumbled = Math.abs(b.angle) > 0.5;
            if(isTumbled || b.position.y > H - groundH + 5) {
                b.isDying = true;
                destroyedCount++;
                dyingBodies.push(b);
                updateProgress();
                if(destroyedCount / totalBlocks >= 0.9) setTimeout(() => checkEnd(true), 1000);
            }
        }
    });

    // 處理漸變消失
    for(let i=dyingBodies.length-1; i>=0; i--) {
        let b = dyingBodies[i]; b.opacity = (b.opacity || 1) - 0.01;
        if(b.opacity <= 0) { World.remove(engine.world, b); dyingBodies.splice(i, 1); }
    }

    updateParticles();
    requestAnimationFrame(loop);
}

/** 詳細繪製函式 **/
function drawDetailedBuilding(b) {
    const w = b.bounds.max.x - b.bounds.min.x;
    const h = b.bounds.max.y - b.bounds.min.y;
    
    ctx.fillStyle = b.render.fill;
    ctx.shadowBlur = 5; ctx.shadowColor = "rgba(0,0,0,0.2)";
    
    // 圓角建築體
    ctx.beginPath();
    ctx.roundRect(-w/2, -h/2, w, h, 3);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 根據類型添加細節
    if(b.bType === 1) { // 窗戶
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fillRect(-w/4, -h/4, w/6, h/3);
        ctx.fillRect(w/4 - w/6, -h/4, w/6, h/3);
    } else if(b.bType === 0) { // 地基
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 2;
        ctx.strokeRect(-w/2+2, -h/2+2, w-4, h-4);
    } else if(b.bType === 2) { // 屋頂
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath(); ctx.moveTo(-w/2, -h/2); ctx.lineTo(w/2, -h/2); ctx.lineTo(0, -h/2 - 10); ctx.fill();
    }
}

function drawDetailedBullet(b) {
    const r = b.circleRadius;
    const grad = ctx.createRadialGradient(-r/3, -r/3, r/5, 0, 0, r);
    
    if(b.weaponType === 'heavy') {
        grad.addColorStop(0, '#6B705C'); grad.addColorStop(1, '#1B1B1E');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#A5A58D"; ctx.lineWidth = 2; ctx.strokeRect(-r/2, -r/2, r, r);
    } else if(b.weaponType === 'blast') {
        grad.addColorStop(0, '#FFF3B0'); grad.addColorStop(1, '#E09F3E');
        ctx.fillStyle = grad;
        ctx.shadowBlur = 15; ctx.shadowColor = "#FFF3B0";
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    } else {
        grad.addColorStop(0, '#FFD1DC'); grad.addColorStop(1, '#FF9AA2');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    }
}

function drawLauncher() {
    // 發射台座
    ctx.fillStyle = "#555";
    ctx.beginPath(); ctx.roundRect(launcherPos.x - 20, launcherPos.y, 40, 60, 5); ctx.fill();
    
    if(isDragging) {
        const dx = launcherPos.x - dragE.x, dy = launcherPos.y - dragE.y;
        // 預測線
        ctx.setLineDash([10, 5]);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(launcherPos.x, launcherPos.y);
        ctx.lineTo(launcherPos.x + dx, launcherPos.y + dy); ctx.stroke();
        ctx.setLineDash([]);
        
        // 拉力點
        ctx.fillStyle = varColor('--accent');
        ctx.beginPath(); ctx.arc(dragE.x, dragE.y, 10, 0, Math.PI*2); ctx.fill();
    }
}

function drawBackground() {
    // 遠山與迷霧
    const bgColors = ['#8ECAE6', '#219EBC', '#023047'];
    bgColors.forEach((c, i) => {
        ctx.fillStyle = c; ctx.globalAlpha = 0.2 + (i*0.1);
        ctx.beginPath();
        ctx.arc(W * (i*0.4), H - groundH, 200 + (i*100), Math.PI, 0);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    // 地面
    ctx.fillStyle = "#2D6A4F";
    ctx.fillRect(0, H - groundH, W, groundH);
}

/** 核心控制器 **/
function setupControls() {
    const getP = (e) => {
        const rect = canvas.getBoundingClientRect();
        return { 
            x: (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left, 
            y: (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top 
        };
    };
    const s = (e) => { 
        const p = getP(e); 
        if(p.x < W * 0.4) { isDragging = true; dragE = p; initAudio(); } 
    };
    const m = (e) => { if(isDragging) dragE = getP(e); };
    const e = () => { if(isDragging) { isDragging = false; fire(); } };

    canvas.addEventListener('mousedown', s); window.addEventListener('mousemove', m); window.addEventListener('mouseup', e);
    canvas.addEventListener('touchstart', s, {passive:false}); window.addEventListener('touchmove', m, {passive:false}); window.addEventListener('touchend', e);
}

function fire() {
    if(ammo <= 0) return;
    const dx = launcherPos.x - dragE.x, dy = launcherPos.y - dragE.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 20) return;

    // 大幅調低速度常數 (0.003 -> 0.001) 實現慢動作感
    const forceMag = Math.min(dist * 0.001, 0.015); 
    const ang = Math.atan2(dy, dx);
    
    let r=15, m=1.5;
    if(weapon === 'heavy') { r=25; m=8; }
    if(weapon === 'blast') { r=18; m=2; }

    const bullet = Bodies.circle(launcherPos.x, launcherPos.y, r, { 
        restitution: 0.4, 
        density: 0.005, // 降低密度讓速度慢
        mass: m,
        frictionAir: 0.005 // 增加空氣阻力讓軌跡更平穩緩慢
    });
    bullet.weaponType = weapon;
    World.add(engine.world, bullet);
    Body.applyForce(bullet, bullet.position, { x: Math.cos(ang)*forceMag*m, y: Math.sin(ang)*forceMag*m });

    ammo--; updateUI(); playTone(400, 0.3, 0.1);

    if(weapon === 'blast') {
        setTimeout(() => {
            if(!bullet.world) return;
            Composite.allBodies(engine.world).forEach(b => {
                if(!b.isStatic) {
                    const d = Vector.magnitude(Vector.sub(b.position, bullet.position));
                    if(d < 180) Body.applyForce(b, b.position, Vector.mult(Vector.normalise(Vector.sub(b.position, bullet.position)), 0.2));
                }
            });
            spawnParticles(bullet.position.x, bullet.position.y, "#FEE440", 30);
            World.remove(engine.world, bullet);
            playTone(80, 0.5, 0.3);
        }, 1200); // 延長爆炸延遲，配合慢動作
    }
}

/** 狀態與 UI **/
function startGame() {
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('msg-overlay').classList.add('hidden');
    
    const bds = Composite.allBodies(engine.world);
    bds.forEach(b => { if(!b.isStatic) World.remove(engine.world, b); });

    dyingBodies = []; destroyedCount = 0;
    ammo = 8 + level;
    updateUI();
    updateProgress();
    createBuilding(level);
}

function checkEnd(win) {
    if(!document.getElementById('msg-overlay').classList.contains('hidden')) return;
    if(win) {
        showM("拆除達成 (90%)", "結構已完全崩塌，實驗成功。", "下一關卡");
        level++;
    } else {
        if(ammo === 0 && dyingBodies.length === 0) {
            setTimeout(() => {
                if(destroyedCount / totalBlocks < 0.9) showM("拆除未達標", "還有建築殘留，請重新精準打擊。", "再次嘗試");
            }, 3000);
        }
    }
}

function showM(t, d, b) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-desc').innerText = d;
    document.querySelector('.btn-start').innerText = b;
    document.getElementById('msg-overlay').classList.remove('hidden');
}

function updateUI() {
    document.getElementById('ui-lv').innerText = level;
    document.getElementById('ui-am').innerText = ammo;
}
function updateProgress() {
    const p = (destroyedCount / totalBlocks) * 100;
    document.getElementById('ui-prog').style.width = Math.min(p, 100) + '%';
}
function setWp(t, b) {
    weapon = t;
    document.querySelectorAll('.wp-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
}

/** 粒子系統與音效 **/
function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color});
}
function updateParticles() {
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
        else { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); }
    }
    ctx.globalAlpha = 1;
}

function initAudio() {
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(f, d, v) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.frequency.value = f; g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

window.onload = init;
</script>
</body>
</html>
