<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>崩崩樂園 - 物理破壞終極版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --sky: linear-gradient(180deg, #A2D2FF 0%, #D0EBFF 100%);
            --accent: #FFB7B2;
            --glass: rgba(255, 255, 255, 0.9);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
        
        /* 強制橫向顯示邏輯 */
        #orientation-wrapper { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        @media screen and (orientation: portrait) {
            #game-container { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: center; }
        }
        @media screen and (orientation: landscape) {
            #game-container { width: 100vw; height: 100vh; }
        }

        #game-container { position: relative; background: var(--sky); overflow: hidden; }
        canvas { display: block; touch-action: none; }

        /* UI 元件 */
        .ui { position: absolute; background: var(--glass); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.4); z-index: 100; pointer-events: auto; }
        #top-bar { top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 30px; display: flex; gap: 30px; align-items: center; min-width: 400px; justify-content: center; }
        #sidebar { left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; padding: 12px; }
        
        .stat-box { text-align: center; }
        .stat-lab { font-size: 9px; font-weight: 800; color: #888; letter-spacing: 1px; }
        .stat-val { font-size: 24px; font-weight: 900; color: #444; }

        .wp-btn { width: 55px; height: 55px; border-radius: 14px; border: 3px solid transparent; background: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wp-btn.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(255,183,178,0.4); }
        .wp-btn span { font-size: 9px; font-weight: bold; margin-top: 3px; color: #666; }

        .progress-container { width: 120px; height: 10px; background: rgba(0,0,0,0.1); border-radius: 5px; overflow: hidden; margin-top: 4px; }
        #prog-fill { height: 100%; background: #95D5B2; width: 0%; transition: width 0.3s; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 35px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .btn-start { background: var(--accent); color: white; border: none; padding: 14px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="orientation-wrapper">
    <div id="game-container">
        <div id="top-bar" class="ui">
            <div class="stat-box"><div class="stat-lab">LEVEL</div><div id="lv-txt" class="stat-val">1</div></div>
            <div class="stat-box"><div class="stat-lab">AMMO</div><div id="am-txt" class="stat-val">8</div></div>
            <div class="stat-box">
                <div class="stat-lab">DESTRUCTION (GOAL 90%)</div>
                <div class="progress-container"><div id="prog-fill"></div></div>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div id="sidebar" class="ui">
            <button class="wp-btn active" onclick="setWp('normal', this)">
                <div style="width:10px; height:10px; border-radius:50%; background:#FF9AA2;"></div><span>標準</span>
            </button>
            <button class="wp-btn" onclick="setWp('heavy', this)">
                <div style="width:18px; height:18px; border-radius:4px; background:#4A4E69;"></div><span>重型</span>
            </button>
            <button class="wp-btn" onclick="setWp('blast', this)">
                <div style="width:12px; height:12px; border-radius:50%; background:#FEE440; box-shadow: 0 0 8px #FEE440;"></div><span>能量</span>
            </button>
        </div>

        <div id="overlay">
            <div class="modal">
                <h2 style="margin:0; color:#444;">崩崩樂園</h2>
                <p style="color:#777; font-size: 14px; margin: 15px 0;">慢動作彈道發射<br>摧毀建築物地基引發連鎖倒塌</p>
                <button class="btn-start" onclick="gameStart()">開始實驗</button>
            </div>
        </div>
    </div>
</div>

<script>
const { Engine, World, Bodies, Composite, Vector, Body, Runner, Events } = Matter;

let engine, canvas, ctx, audioCtx, bLoop;
let W, H, ammo = 8, level = 1, weapon = 'normal';
let isDragging = false, dragE = {x:0, y:0};
let totalBlocks = 0, destroyedCount = 0, isLevelEnding = false;
let dyingBodies = [], particles = [], trails = [];
let launcherPos = { x: 0, y: 0 };
const groundH = 80;

function init() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    
    // 物理引擎設定：關閉睡眠，提高精度
    engine = Engine.create();
    engine.enableSleeping = false; // 關鍵：不讓物件進入睡眠，確保地基毀掉後上方會動
    engine.world.gravity.y = 1.0;
    engine.positionIterations = 15;

    const runner = Runner.create();
    Runner.run(runner, engine);

    resize();
    window.addEventListener('resize', resize);
    loop();
    setupInputs();
}

function resize() {
    const container = document.getElementById('game-container');
    W = canvas.width = container.clientWidth;
    H = canvas.height = container.clientHeight;
    launcherPos = { x: W * 0.18, y: H - groundH - 50 };
    
    if(window.ground) World.remove(engine.world, window.ground);
    window.ground = Bodies.rectangle(W/2, H - groundH/2, W * 2, groundH, { isStatic: true, friction: 0.4 });
    World.add(engine.world, window.ground);
}

/** 音效與音樂系統 **/
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // BGM Loop
    const melody = [261.6, 329.6, 392.0, 440.0, 523.2];
    let note = 0;
    setInterval(() => {
        if(audioCtx.state === 'running') playTone(melody[note++ % melody.length], 0.8, 'sine', 0.02);
    }, 1200);
}

function playTone(freq, dur, type, vol) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playSFX(type) {
    if(!audioCtx) return;
    if(type === 'shoot') playTone(400, 0.3, 'triangle', 0.1);
    if(type === 'hit') playTone(120, 0.2, 'sine', 0.2);
    if(type === 'blast') { playTone(60, 0.8, 'sawtooth', 0.3); playTone(40, 0.8, 'sine', 0.4); }
}

/** 核心循環 **/
function loop() {
    Engine.update(engine, 1000/60);
    ctx.clearRect(0, 0, W, H);
    
    // 繪製背景山脈
    drawBG();

    // 繪製發射軌跡
    if(isDragging) {
        const dx = launcherPos.x - dragE.x, dy = launcherPos.y - dragE.y;
        ctx.setLineDash([8, 4]); ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.moveTo(launcherPos.x, launcherPos.y); ctx.lineTo(launcherPos.x + dx, launcherPos.y + dy); ctx.stroke();
        ctx.setLineDash([]);
    }

    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(b => {
        if(b.isStatic) return;
        
        ctx.save();
        ctx.translate(b.position.x, b.position.y);
        ctx.rotate(b.angle);
        ctx.globalAlpha = b.opacity || 1;

        if(b.isBlock) {
            drawBlock(b);
            // 判定：只要位移或大幅傾斜就算摧毀
            if(!b.isDying) {
                const isTumbled = Math.abs(b.angle) > 0.5;
                const isMoved = Math.abs(b.position.x - b.originX) > 40;
                const isOffGround = b.position.y > H - groundH + 5;
                if(isTumbled || isMoved || isOffGround) {
                    b.isDying = true; destroyedCount++;
                    dyingBodies.push(b);
                    playSFX('hit');
                    updateProgress();
                }
            }
        } else {
            drawBullet(b);
            if(b.speed > 1) trails.push({x: b.position.x, y: b.position.y, life: 1});
        }
        ctx.restore();
    });

    // 消逝處理
    for(let i=dyingBodies.length-1; i>=0; i--) {
        let b = dyingBodies[i]; b.opacity = (b.opacity || 1) - 0.01;
        if(b.opacity <= 0) { World.remove(engine.world, b); dyingBodies.splice(i, 1); }
    }

    drawTrails();
    updateParticles();
    requestAnimationFrame(loop);
}

function drawBlock(b) {
    const w = b.bounds.max.x - b.bounds.min.x;
    const h = b.bounds.max.y - b.bounds.min.y;
    ctx.fillStyle = b.render.fill;
    ctx.beginPath(); ctx.roundRect(-w/2, -h/2, w, h, 4); ctx.fill();
    // 增加窗戶細節
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(-w/4, -h/4, w/8, h/3); ctx.fillRect(w/8, -h/4, w/8, h/3);
}

function drawBullet(b) {
    const r = b.circleRadius;
    const grad = ctx.createRadialGradient(-r/3, -r/3, r/5, 0, 0, r);
    if(b.weaponType === 'heavy') grad.addColorStop(0, '#777'), grad.addColorStop(1, '#222');
    else if(b.weaponType === 'blast') grad.addColorStop(0, '#FFF3B0'), grad.addColorStop(1, '#E09F3E'), ctx.shadowBlur=15, ctx.shadowColor="#FEE440";
    else grad.addColorStop(0, '#FFD1DC'), grad.addColorStop(1, '#FF808B');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
}

function drawBG() {
    const cols = ['#8ECAE6', '#219EBC', '#023047'];
    cols.forEach((c, i) => {
        ctx.fillStyle = c; ctx.globalAlpha = 0.15 + i*0.1;
        ctx.beginPath(); ctx.arc(W*(i*0.4), H-groundH, 200+i*100, Math.PI, 0); ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.fillStyle = "#2D6A4F"; ctx.fillRect(0, H-groundH, W, groundH);
}

/** 遊戲功能 **/
function gameStart() {
    initAudio();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('overlay').classList.add('hidden');
    isLevelEnding = false;
    
    // 清除舊物體
    Composite.allBodies(engine.world).forEach(b => { if(!b.isStatic) World.remove(engine.world, b); });
    
    dyingBodies = []; trails = []; particles = [];
    destroyedCount = 0;
    ammo = 8 + level;
    updateUI(); updateProgress();
    
    createBuilding();
}

function createBuilding() {
    const startX = W * 0.7;
    const bW = 38, bH = 30;
    const colors = ['#E9C46A', '#F4A261', '#E76F51', '#A8DADC', '#457B9D'];
    
    let stacks = 1 + Math.floor(level / 3);
    if(stacks > 3) stacks = 3;

    for(let s=0; s<stacks; s++) {
        let curX = startX + (s * 90);
        let rows = 4 + level; if(rows > 15) rows = 15;
        let cols = (level > 1 && level % 2 === 0) ? 2 : 1;

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                let x = curX - ((cols-1)*bW/2) + (c*(bW+4));
                let y = (H - groundH) - (bH/2) - (r*(bH+1));
                let box = Bodies.rectangle(x, y, bW, bH, {
                    restitution: 0.1, friction: 0.3, frictionStatic: 0.2, // 降低摩擦力，讓地基毀掉後上面更好滑動
                    render: { fill: colors[Math.floor(Math.random()*colors.length)] }
                });
                box.isBlock = true; box.originX = x;
                World.add(engine.world, box);
            }
        }
    }
    totalBlocks = Composite.allBodies(engine.world).filter(b => b.isBlock).length;
}

function setupInputs() {
    const getP = (e) => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX || (e.touches && e.touches[0].clientX)) - r.left, 
                 y: (e.clientY || (e.touches && e.touches[0].clientY)) - r.top };
    };
    canvas.addEventListener('mousedown', (e) => { if(getP(e).x < W*0.45) isDragging = true; });
    window.addEventListener('mousemove', (e) => { if(isDragging) dragE = getP(e); });
    window.addEventListener('mouseup', () => { if(isDragging) { isDragging = false; fire(); } });
    canvas.addEventListener('touchstart', (e) => { if(getP(e).x < W*0.45) isDragging = true; }, {passive:false});
    window.addEventListener('touchmove', (e) => { if(isDragging) dragE = getP(e); }, {passive:false});
    window.addEventListener('touchend', () => { if(isDragging) { isDragging = false; fire(); } });
}

function fire() {
    if(ammo <= 0 || isLevelEnding) return;
    const dx = launcherPos.x - dragE.x, dy = launcherPos.y - dragE.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 20) return;

    // 優化後的慢速彈道推力
    const fMag = Math.min(dist * 0.003, 0.08); 
    const ang = Math.atan2(dy, dx);
    
    let r=8, m=3, den=0.01;
    if(weapon === 'heavy') { r=16, m=25, den=0.1; } // 重型彈密度與質量大幅提升
    if(weapon === 'blast') { r=12, m=4, den=0.015; }

    const bullet = Bodies.circle(launcherPos.x, launcherPos.y, r, { 
        restitution: 0.4, density: den, mass: m, frictionAir: 0.002 
    });
    bullet.weaponType = weapon;
    World.add(engine.world, bullet);
    Body.applyForce(bullet, bullet.position, { x: Math.cos(ang)*fMag*m, y: Math.sin(ang)*fMag*m });

    ammo--; updateUI(); playSFX('shoot');

    if(weapon === 'blast') {
        setTimeout(() => {
            if(!bullet.world) return;
            const bds = Composite.allBodies(engine.world);
            bds.forEach(b => {
                if(!b.isStatic) {
                    const d = Vector.magnitude(Vector.sub(b.position, bullet.position));
                    if(d < 180) {
                        // 爆炸衝擊：強化地基破壞效果
                        const forceVec = Vector.mult(Vector.normalise(Vector.sub(b.position, bullet.position)), 0.25 * b.mass);
                        Body.applyForce(b, b.position, forceVec);
                    }
                }
            });
            spawnParticles(bullet.position.x, bullet.position.y, "#FEE440", 40);
            World.remove(engine.world, bullet); playSFX('blast');
        }, 1000);
    }
}

function updateUI() {
    document.getElementById('lv-txt').innerText = level;
    document.getElementById('am-txt').innerText = ammo;
}
function updateProgress() {
    const p = (destroyedCount / totalBlocks) * 100;
    document.getElementById('prog-fill').style.width = Math.min(p, 100) + '%';
    if(p >= 90 && !isLevelEnding) {
        isLevelEnding = true;
        setTimeout(() => { showM("拆除成功 (90%↑)", "建築結構已徹底瓦解。", "下一關卡"); level++; }, 1500);
    }
}
function setWp(t, b) {
    weapon = t;
    document.querySelectorAll('.wp-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
}
function showM(t, d, b) {
    document.getElementById('m-title').innerText = t;
    document.getElementById('m-desc').innerText = d;
    document.querySelector('.start-btn').innerText = b;
    document.getElementById('overlay').classList.remove('hidden');
}
function drawTrails() {
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    trails.forEach((t, i) => {
        ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, Math.PI*2); ctx.fill();
        t.life -= 0.02; if(t.life <= 0) trails.splice(i, 1);
    });
}
function updateParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
        else { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); }
    });
    ctx.globalAlpha = 1;
}
function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, color});
}
window.onload = init;
</script>
</body>
</html>
